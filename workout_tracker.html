<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mi Amor Shredded</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--s1:#131313;--s2:#1a1a1a;--s3:#222;
  --b1:#2a2a2a;--b2:#3a3a3a;--b3:#555;
  --tx:#f2f2f2;--tm:#aaa;--tf:#555;
  --green:#39d98a;--gd:#0d2e1c;--gm:#1a4a2e;
  --blue:#4da6ff;--bd:#0a1f3a;
  --purple:#a78bfa;--pd:#1a1040;
  --amber:#f5a623;--ad:#2e1e00;
  --red:#ff5c5c;--teal:#2dd4bf;
  --font-d:'Barlow Condensed',sans-serif;
  --font-b:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:var(--font-b);min-height:100vh;overflow-x:hidden}
body{padding-bottom:70px}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--b1);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--tf);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn span{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.nav-btn.active{color:var(--green)}

/* VIEWS */
.view{display:none;padding:16px;position:relative;z-index:1}
.view.active{display:block}

/* TYPOGRAPHY */
.page-title{font-family:var(--font-d);font-size:28px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:16px;line-height:1}
.page-sub{font-size:13px;color:var(--tm);margin-top:3px;font-weight:400;font-family:var(--font-b);text-transform:none;letter-spacing:0}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;margin-bottom:12px;overflow:hidden}
.card-pad{padding:14px}
.card-title{font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tm);margin-bottom:10px}

/* TOTAL TIME BANNER */
.time-banner{background:linear-gradient(135deg,#0d2e1c 0%,#0a1f3a 100%);border:1px solid var(--gm);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.time-banner-left{}
.time-banner-label{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);margin-bottom:4px}
.time-banner-val{font-family:var(--font-d);font-size:38px;font-weight:800;color:var(--green);line-height:1}
.time-banner-sub{font-size:12px;color:var(--tm);margin-top:4px}
.time-breakdown{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.tb-item{font-size:11px;color:var(--tf);font-family:var(--font-d);font-weight:600;letter-spacing:.03em}
.tb-item span{color:var(--tm)}

/* GYM NUDGE BANNER */
.nudge-banner{border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.nudge-banner.urgent{background:#2e1a00;border:1px solid #5a3300}
.nudge-banner.normal{background:var(--gd);border:1px solid var(--gm)}
.nudge-banner.streak{background:var(--pd);border:1px solid #3a2a7a}
.nudge-icon{font-size:24px;flex-shrink:0}
.nudge-text{}
.nudge-title{font-family:var(--font-d);font-size:15px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.nudge-banner.urgent .nudge-title{color:var(--amber)}
.nudge-banner.normal .nudge-title{color:var(--green)}
.nudge-banner.streak .nudge-title{color:var(--purple)}
.nudge-sub{font-size:12px;color:var(--tm);line-height:1.4}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:12px 14px}
.stat-card.hi{border-color:var(--gm);background:var(--gd)}
.stat-label{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tm);margin-bottom:4px}
.stat-val{font-family:var(--font-d);font-size:32px;font-weight:800;line-height:1;color:var(--tx)}
.stat-card.hi .stat-val{color:var(--green)}
.stat-sub{font-size:11px;color:var(--tf);margin-top:3px}

/* PROGRESS RING */
.ring-wrap{display:flex;align-items:center;gap:16px;padding:14px}
.ring-info{flex:1}
.ring-pct{font-family:var(--font-d);font-size:42px;font-weight:800;color:var(--green);line-height:1}
.ring-label{font-size:13px;color:var(--tm);margin-top:4px}
.ring-done{font-family:var(--font-d);font-size:14px;font-weight:600;color:var(--tx);margin-top:6px}

/* PHASES */
.phase-head{display:flex;align-items:center;gap:8px;padding:10px 14px 8px;border-bottom:1px solid var(--b1);cursor:pointer;user-select:none}
.phase-pill{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:4px;flex-shrink:0}
.pp-warm{background:var(--ad);color:var(--amber)}
.pp-strength{background:var(--bd);color:var(--blue)}
.pp-hyp{background:var(--pd);color:var(--purple)}
.pp-circuit{background:#2e0a0a;color:var(--red)}
.pp-finish{background:var(--gd);color:var(--green)}
.phase-dur{font-size:11px;color:var(--tf);margin-left:auto}
.phase-chevron{width:16px;height:16px;stroke:var(--tf);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;flex-shrink:0;margin-left:6px}
.phase-chevron.open{transform:rotate(180deg)}
.phase-body{display:none}
.phase-body.open{display:block}
.phase-instructions{font-size:12px;color:var(--tm);line-height:1.6;padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--b1)}
.phase-instructions b{color:var(--tx);font-weight:500}

/* EXERCISE ROWS */
.ex-row{display:grid;grid-template-columns:28px 1fr;gap:8px;align-items:start;padding:10px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s}
.ex-row:last-child{border-bottom:none}
.ex-row:active{background:var(--s2)}
.ex-row.done{opacity:.4}
.ex-row.done .ex-name{text-decoration:line-through}
.check{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.check.ticked{background:var(--green);border-color:var(--green)}
.ex-info{min-width:0}
.ex-name{font-size:14px;font-weight:500;color:var(--tx);line-height:1.3}
.ex-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.meta-pill{font-size:11px;padding:2px 7px;border-radius:4px;font-family:var(--font-d);font-weight:600;letter-spacing:.04em;white-space:nowrap}
.mp-sets{background:var(--s3);color:var(--tm)}
.mp-weight{background:var(--gd);color:var(--green)}
.mp-speed{background:var(--bd);color:var(--blue)}
.mp-rest{background:var(--s3);color:var(--tf)}
.demo-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--blue);font-family:var(--font-d);font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;margin-top:5px}
.demo-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* COMPLETE BTN */
.complete-btn{width:100%;padding:16px;background:var(--green);color:#000;font-family:var(--font-d);font-size:17px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;margin-top:4px;transition:opacity .2s}
.complete-btn:active{opacity:.8}

/* NOTICES */
.day-notice{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:24px 16px;text-align:center;margin-bottom:12px}
.notice-title{font-family:var(--font-d);font-size:24px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.notice-sub{font-size:13px;color:var(--tm);line-height:1.6;max-width:280px;margin:0 auto}

/* WEEK STRIP */
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px}
.ws-day{border-radius:8px;padding:8px 3px 7px;text-align:center;border:1px solid var(--b1);background:var(--s1);cursor:pointer;transition:all .15s;position:relative}
.ws-day:active{transform:scale(0.95)}
.ws-day.today{border-color:var(--green)}
.ws-day.viewing{box-shadow:0 0 0 2px var(--green);border-color:var(--green)}
.ws-day.type-a{background:var(--bd);border-color:#1e4a7a}
.ws-day.type-b{background:var(--pd);border-color:#3a2a7a}
.ws-day.type-cardio{background:var(--gd);border-color:var(--gm)}
.ws-day.type-rec{background:var(--ad);border-color:#5a3300}
.ws-day.type-rest{opacity:.4}
.ws-name{font-family:var(--font-d);font-size:11px;font-weight:700;color:var(--tm);letter-spacing:.04em}
.ws-day.today .ws-name,.ws-day.type-a .ws-name{color:var(--blue)}
.ws-day.today .ws-name{color:var(--green)}
.ws-day.type-b .ws-name{color:var(--purple)}
.ws-day.type-cardio .ws-name{color:var(--green)}
.ws-day.type-rec .ws-name{color:var(--amber)}
.ws-type{font-size:9px;color:var(--tf);margin-top:2px;font-family:var(--font-d);font-weight:600;letter-spacing:.03em;text-transform:uppercase}
.viewing-banner{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--tm)}
.viewing-banner b{color:var(--green);font-family:var(--font-d);font-weight:700;letter-spacing:.03em}
.viewing-banner .back-btn{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tf);background:none;border:1px solid var(--b1);border-radius:5px;padding:4px 10px;cursor:pointer}

/* CHARTS */
.chart-wrap{position:relative;width:100%;height:200px}

/* WEIGHT INPUT */
.w-input-row{display:flex;gap:8px;margin-bottom:8px}
.w-input-row input{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:12px 14px;color:var(--tx);font-family:var(--font-b);font-size:16px}
.w-input-row input::placeholder{color:var(--tf)}
.w-input-row input:focus{outline:none;border-color:var(--green)}
.w-log-btn{background:var(--green);color:#000;border:none;border-radius:8px;padding:12px 18px;font-family:var(--font-d);font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;cursor:pointer}

/* HISTORY */
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b1)}
.hist-row:last-child{border-bottom:none}
.hist-date{font-size:13px;color:var(--tx)}
.hist-type{font-size:11px;color:var(--tm);margin-top:2px;font-family:var(--font-d);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.hist-pct{font-family:var(--font-d);font-size:18px;font-weight:800;color:var(--green)}
.hist-wt{font-size:11px;color:var(--tm);margin-top:2px;text-align:right}

/* CAL GRID */
.cal-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-lbl{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--tf);text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;border-radius:3px;background:var(--s2)}
.cal-cell.done-a{background:var(--blue)}
.cal-cell.done-b{background:var(--purple)}
.cal-cell.done-c{background:var(--teal)}
.cal-cell.done-r{background:var(--gm)}
.cal-cell.today-c{border:1.5px solid var(--green)}
.cal-cell.future{opacity:.2}

/* PROGRAMME */
.prog-table{width:100%;border-collapse:collapse;font-size:12px}
.prog-table th{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tf);padding:6px 8px;text-align:left;border-bottom:1px solid var(--b1)}
.prog-table td{padding:8px;border-bottom:1px solid var(--b1);vertical-align:top;color:var(--tm)}
.prog-table tr:last-child td{border-bottom:none}
.prog-table td:first-child{color:var(--tx);font-weight:500}
.wt-cell{color:var(--green)!important;font-family:var(--font-d);font-weight:700;font-size:13px}
.spd-cell{color:var(--blue)!important;font-family:var(--font-d);font-weight:700;font-size:13px}
.prog-demo{color:var(--blue);text-decoration:none;font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.04em}

/* SETTINGS */
.settings-label{font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tm);margin-bottom:8px;display:block}
.settings-input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:12px 14px;color:var(--tx);font-family:var(--font-b);font-size:15px;margin-bottom:10px}
.settings-input:focus{outline:none;border-color:var(--green)}
.save-btn{width:100%;padding:14px;background:var(--green);color:#000;font-family:var(--font-d);font-size:16px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer}
.reset-btn{width:100%;padding:13px;background:none;border:1px solid #3a1a1a;border-radius:10px;color:var(--red);font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--b1)}
.toggle-label{font-size:14px;color:var(--tx)}
.toggle-sub{font-size:12px;color:var(--tm);margin-top:2px}
.toggle{width:44px;height:24px;background:var(--b1);border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

/* NOTIF PERMISSION */
.notif-card{background:var(--pd);border:1px solid #3a2a7a;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.notif-card.granted{background:var(--gd);border-color:var(--gm)}
.notif-btn{background:var(--purple);color:#000;border:none;border-radius:8px;padding:10px 16px;font-family:var(--font-d);font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0}
.notif-card.granted .notif-btn{background:var(--green)}

/* BASELINE INPUT */
.baseline-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.baseline-item{}
.baseline-label{font-size:11px;color:var(--tm);font-family:var(--font-d);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.baseline-input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;color:var(--tx);font-family:var(--font-b);font-size:14px}
.baseline-input:focus{outline:none;border-color:var(--green)}
.baseline-hint{font-size:11px;color:var(--tf);margin-top:3px}

/* WEEK DAY ROW */
.week-day-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.week-day-row:last-child{border-bottom:none}
.wdr-day{font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:.04em;min-width:36px;color:var(--tm)}
.wdr-badge{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:4px;min-width:72px;text-align:center}
.wb-a{background:var(--bd);color:var(--blue)}
.wb-b{background:var(--pd);color:var(--purple)}
.wb-c{background:var(--gd);color:var(--green)}
.wb-r{background:var(--s2);color:var(--tf)}
.wb-rec{background:var(--ad);color:var(--amber)}
.wdr-detail{font-size:12px;color:var(--tm);flex:1}

/* TOAST */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;font-family:var(--font-d);font-size:13px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:10px 22px;border-radius:8px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONFETTI */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:998;animation:fall 1.2s ease-in forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* LOGO */
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.logo-icon{width:44px;height:44px;flex-shrink:0}
.logo-text{}
.logo-title{font-family:var(--font-d);font-size:22px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;line-height:1;color:var(--tx)}
.logo-title span{color:var(--green)}
.logo-sub{font-size:11px;color:var(--tf);letter-spacing:.08em;text-transform:uppercase;font-family:var(--font-d);font-weight:600;margin-top:2px}

.divider{height:1px;background:var(--b1);margin:12px 0}
.empty{font-size:13px;color:var(--tf);padding:8px 0}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="goNav('today',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Today</span>
  </button>
  <button class="nav-btn" onclick="goNav('dash',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Progress</span>
  </button>
  <button class="nav-btn" onclick="goNav('prog',this)">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <span>Plan</span>
  </button>
  <button class="nav-btn" onclick="goNav('settings',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span>Settings</span>
  </button>
</nav>

function saveS(){

function today(){ return new Date().toISOString().slice(0,10); }
function todayDow(){ return (new Date().getDay()+6)%7; }
function weekNumber(){ const d=Math.max(0,(new Date()-new Date(S.settings.startDate+'T12:00:00'))/86400000); return Math.min(12,Math.max(1,Math.ceil(d/7))); }
function weekPairIdx(){ return Math.min(5,Math.floor((weekNumber()-1)/2)); }

// Get weight for an exercise this week, building from baseline
function getW(group, key){
  const wpi = weekPairIdx();
  const deload = S.settings.deload;
  const bl = S.baseline || DEFAULT_WK1;
  const base = bl[group] ? bl[group][key] : DEFAULT_WK1[group][key];
  const prog = PROG[group] ? (PROG[group][key]||0) : 0;
  const val = base + prog * wpi;
  return deload ? Math.round(val*0.6*2)/2 : val;
}

function fmt(kg){ return Number.isInteger(kg) ? kg+'kg' : kg.toFixed(1)+'kg'; }
function fmtSpd(s){ return Number.isInteger(s) ? s+' km/h' : s.toFixed(1)+' km/h'; }

let _viewingDow = null; // null = viewing today, 0-6 = viewing that day of week
function getNudge(dow, type, streak, alreadyDone){
  const hour = new Date().getHours();
  const sched = FIXED_SCHEDULE[dow];
  const suggested = SUGGESTED_TIMES[dow];

  if(alreadyDone) return null;
  if(type==='rest') return null;
  if(type==='rec') return null;

  const messages = {
    pre_morning_lift: [
      {title:'Time to move', sub:`Suggested time: ${suggested?.primary||'6:00am'}. ${suggested?.note||''}. Get to the gym and build that streak.`, style:'normal'},
      {title:'Your body is ready', sub:`Best time for this session is ${suggested?.primary||'6:00am'}. Training fasted burns more fat — go before breakfast.`, style:'normal'},
    ],
    morning_lift_now: [
      {title:'Go now', sub:`It's ${hour}:00 — this is your prime window. Kit on, gym in ${hour<8?'minutes':'20 minutes'}. Don't break the streak.`, style:'urgent'},
      {title:'Window is open', sub:`Your optimal training window is right now. Session takes ${type==='cardio'?62:type==='b'?76:79} minutes. Go.`, style:'urgent'},
    ],
    afternoon_lift: [
      {title:`${suggested?.secondary||'5:30pm'} session`, sub:`If you didn't go this morning, go at ${suggested?.secondary||'5:30pm'}. Session is ${type==='b'?'76':'79'} min. You've got time.`, style:'normal'},
    ],
    streak_risk: [
      {title:'Streak at risk', sub:`${streak} sessions in a row. Don't let today break it. Get to the gym — even 80% effort beats zero.`, style:'streak'},
      {title:`${streak} session streak`, sub:`You've built something real. Protect it. Get to the gym today.`, style:'streak'},
    ],
    late_push: [
      {title:'Last chance today', sub:`It's ${hour}:00. Gym is still open. A session now is better than breaking the routine. Go.`, style:'urgent'},
    ],
  };

  let key;
  if(streak>=3) key='streak_risk';
  else if(hour<7) key='pre_morning_lift';
  else if(hour>=7 && hour<10) key='morning_lift_now';
  else if(hour>=10 && hour<17) key='afternoon_lift';
  else if(hour>=17 && hour<20) key='morning_lift_now';
  else key='late_push';

  const pool = messages[key] || messages['morning_lift_now'];
  return pool[Math.floor(Math.random()*pool.length)];
}

  if(type==='rest'){
    html += `<div class="day-notice"><div class="notice-title">Rest Day</div><div class="notice-sub">Sunday is non-negotiable. Eat your protein, sleep 8+ hours, come back Monday ready.</div></div>`;
    el.innerHTML = html; return;
  }

  // RECOVERY
  if(type==='rec'){
    html += `<div class="day-notice"><div class="notice-title" style="color:var(--amber)">${sched.label}</div><div class="notice-sub">${sched.desc}</div></div>`;
    if(isViewingToday && !alreadyDone) html += `<button class="complete-btn" onclick="logRecovery()" style="background:var(--amber);color:#000">Log recovery session</button>`;
    el.innerHTML = html; return;
  }

  // LIFT / CARDIO — build phases
  const phases = dayKey==='a' ? buildDayA() : dayKey==='b' ? buildDayB() : buildCardio();
  const times = SESSION_TIMES[dayKey] || SESSION_TIMES.a;
  const totalEx = phases.reduce((a,p)=>a+p.exercises.length,0);
  const doneEx = isViewingToday ? Object.values(S.ticks).filter(Boolean).length : 0;
  const pct = Math.round(Math.min(doneEx,totalEx)/totalEx*100);
  const circ = 2*Math.PI*36;

  // TIME BANNER
  const sug2 = SUGGESTED_TIMES[viewDow];
  const hour = now.getHours();
  const sugStr = sug2 ? (hour<12?sug2.primary:sug2.secondary) : '';
  const bdItems = Object.entries(times).filter(([k])=>k!=='total').map(([k,v])=>`<div class="tb-item"><span>${k.charAt(0).toUpperCase()+k.slice(1)}:</span> ${v} min</div>`).join('');
  html += `<div class="time-banner">
    <div class="time-banner-left">
      <div class="time-banner-label">Total session time</div>
      <div class="time-banner-val">${times.total} min</div>
      <div class="time-banner-sub">${sugStr?`Start by ${sugStr} to finish on time`:'Plan your time'}</div>
    </div>
    <div class="time-breakdown">${bdItems}</div>
  </div>`;

  // PROGRESS RING (today only)
  if(isViewingToday){
    const offset = circ-(pct/100)*circ;
    html += `<div class="card"><div class="ring-wrap">
      <svg width="90" height="90" viewBox="0 0 90 90" style="flex-shrink:0">
        <circle cx="45" cy="45" r="36" fill="none" stroke="var(--s3)" stroke-width="6"/>
        <circle cx="45" cy="45" r="36" fill="none" stroke="var(--green)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" transform="rotate(-90 45 45)" id="ring-arc"/>
      </svg>
      <div class="ring-info">
        <div class="ring-pct" id="ring-pct">${pct}%</div>
        <div class="ring-label">session progress</div>
        <div class="ring-done" id="ring-done">${Math.min(doneEx,totalEx)} / ${totalEx} exercises ticked</div>
      </div>
    </div></div>`;
  }

  // PHASES
  phases.forEach((phase,pi)=>{
    html += `<div class="card">
      <div class="phase-head" onclick="togglePhase('pb${pi}','pc${pi}')">
        <span class="phase-pill ${phase.pill}">${phase.label}</span>
        <span class="phase-dur">${phase.dur}</span>
        <svg class="phase-chevron${pi===0?' open':''}" id="pc${pi}" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="phase-body${pi===0?' open':''}" id="pb${pi}">
        <div class="phase-instructions">${phase.instructions}</div>`;
    phase.exercises.forEach((ex,ei)=>{
      const key=`${phase.id}_${ei}`;
      const done = isViewingToday && !!S.ticks[key];
      const clickable = isViewingToday;
      html+=`<div class="ex-row${done?' done':''}" id="exrow_${key}" ${clickable?`onclick="tickEx('${key}',${totalEx},${circ.toFixed(1)})"`:'style="cursor:default"'}>
        <div class="check${done?' ticked':''}" id="chk_${key}">${done?`<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
        </div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">
            <span class="meta-pill mp-sets">${ex.sets}</span>
            ${ex.weight?`<span class="meta-pill mp-weight">${ex.weight}</span>`:''}
            ${ex.speed?`<span class="meta-pill mp-speed">${ex.speed}</span>`:''}
            ${ex.rest?`<span class="meta-pill mp-rest">Rest: ${ex.rest}</span>`:''}
          </div>
          ${ex.demo?`<a href="${ex.demo}" target="_blank" class="demo-btn"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Watch demo</a>`:''}
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });

  if(isViewingToday) html+=`<button class="complete-btn" onclick="finishSession(${totalEx})">Mark session complete</button>`;
  html+=`<div style="height:16px"></div>`;
  el.innerHTML = html;
}

  if(S.sessions.find(s=>s.date===t)) return;
  const done = Object.values(S.ticks).filter(Boolean).length;
  const pct = Math.round(Math.min(done,totalEx)/totalEx*100);
  const type = FIXED_SCHEDULE[todayDow()].day;
  S.sessions.push({date:t, pct, type});
  S.ticks = {};

  confetti();

let _notifTimers = [];
let _notifLastScheduledDate = null;

function requestNotifPermission(){
  if(!('Notification' in window)){ showToast('Notifications not supported'); return; }
  Notification.requestPermission().then(p=>{
    S.settings.notifGranted = p==='granted';
    saveS();
    if(p==='granted'){ showToast('Notifications on!'); initNotifs(); renderSettings(); }
    else showToast('Permission denied in browser');
  });
}

function initNotifs(){
  _notifTimers.forEach(t=>clearTimeout(t));
  _notifTimers = [];
  if(!S.settings.notifGranted || Notification.permission!=='granted') return;

  const t = today();
  if(_notifLastScheduledDate === t) return;
  _notifLastScheduledDate = t;

  const dow = todayDow();
  const ns = S.settings;

  // Check if today is a notif day
  const notifDays = ns.notifDays || [0,2,4,5];
  if(!notifDays.includes(dow)) {
    // Still set midnight reset
    scheduleMidnightReset();
    return;
  }

  // Build list of hours to fire
  const [startH] = (ns.notifStart||'07:00').split(':').map(Number);
  const [endH]   = (ns.notifEnd||'21:00').split(':').map(Number);
  const mode = ns.notifMode || 'hourly';
  const interval = Math.max(1, parseInt(ns.notifInterval)||2);

  const hours = [];
  if(mode === 'hourly'){
    for(let h=startH; h<=endH; h++) hours.push(h);
  } else {
    // interval mode — every N hours from start
    for(let h=startH; h<=endH; h+=interval) hours.push(h);
  }

  const now = new Date();
  const streak = calcStreak();

  hours.forEach((h, idx) => {
    const fireAt = new Date(); fireAt.setHours(h,0,0,0);
    const delay = fireAt - now;
    if(delay < 0) return;

    const msg = NOTIF_MESSAGES[idx % NOTIF_MESSAGES.length];
    const body = streak >= 3 ? `${streak}-session streak. ${msg.body}` : msg.body;

    const timer = setTimeout(()=>{
      if(S.sessions.find(s=>s.date===today())) return; // session already logged
      new Notification(msg.title, { body, tag:`shred-${h}`, requireInteraction:false });
    }, delay);
    _notifTimers.push(timer);
  });

  scheduleMidnightReset();
}

function scheduleMidnightReset(){
  const midnight = new Date(); midnight.setHours(24,0,0,0);
  const t = setTimeout(()=>{
    _notifLastScheduledDate = null;
    _notifTimers.forEach(x=>clearTimeout(x));
    _notifTimers = [];
    initNotifs();
  }, midnight - new Date());
  _notifTimers.push(t);
}

function cancelTodayNotifs(){
  _notifTimers.forEach(t=>clearTimeout(t));
  _notifTimers = [];
}

function buildCal(){
  const grid=document.getElementById('cal-grid'); if(!grid) return;
  const start=new Date(S.settings.startDate+'T12:00:00');
  const t=today(); const dd={};
  S.sessions.forEach(s=>dd[s.date]=s.type);
  let html='';
  for(let i=0;i<84;i++){
    const d=new Date(start); d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const tp=dd[ds];
    const cls=tp==='a'?'done-a':tp==='b'?'done-b':tp==='cardio'?'done-c':tp?'done-r':'';
    html+=`<div class="cal-cell${cls?' '+cls:''}${ds===t?' today-c':''}${ds>t?' future':''}"></div>`;
  }
  grid.innerHTML=html;
}

function buildHist(){
  const el=document.getElementById('hist-list'); if(!el) return;
  const sessions=[...S.sessions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12);
  if(!sessions.length){el.innerHTML='<div class="empty">No sessions logged yet.</div>';return;}
  const wb={};S.weights.forEach(w=>wb[w.date]=w.kg);
  el.innerHTML=sessions.map(s=>{
    const wStr=wb[s.date]?wb[s.date].toFixed(1)+'kg':'';
    const lbl={'a':'Day A','b':'Day B','cardio':'Cardio','rec':'Recovery','rest':'Rest'}[s.type]||s.type;
    return `<div class="hist-row"><div><div class="hist-date">${s.date}</div><div class="hist-type">${lbl}</div></div><div style="text-align:right"><div class="hist-pct">${s.pct}%</div><div class="hist-wt">${wStr}</div></div></div>`;
  }).join('');
}

function buildProgRows(){
  const bl = S.baseline || DEFAULT_WK1;
  const rows=[
    {label:'Power Snatch',g:'a',k:'snatch'},
    {label:'Front Squat',g:'a',k:'fsquat'},
    {label:'Incline Bench DBs',g:'a',k:'bench'},
    {label:'RDL',g:'a',k:'rdl'},
    {label:'DB Thruster',g:'b',k:'thruster'},
    {label:'Goblet Squat',g:'b',k:'goblet'},
    {label:'Leg Curl',g:'b',k:'legcurl'},
    {label:'Lat Pulldown',g:'b',k:'pulldown'},
  ];
  return rows.map(r=>{
    const base=(bl[r.g]&&bl[r.g][r.k]!=null)?bl[r.g][r.k]:DEFAULT_WK1[r.g][r.k];
    const prog=PROG[r.g]?PROG[r.g][r.k]||0:0;
    const cells=Array.from({length:6},(_,i)=>fmt(base+prog*i)).map(v=>`<td class="wt-cell">${v}</td>`).join('');
    return `<tr><td>${r.label}</td>${cells}</tr>`;
  }).join('');
}

  const tw=document.getElementById('set-tw'); if(tw&&tw.value) S.settings.targetWeight=parseFloat(tw.value)||S.settings.targetWeight;
  saveS();
  showToast('Settings saved');
  if(S.settings.notifGranted && Notification.permission==='granted'){ _notifLastScheduledDate=null; initNotifs(); }
}

function toggleDeload(){
  S.settings.deload=!S.settings.deload;
  const t=document.getElementById('deload-tog');
  if(t) t.classList.toggle('on',S.settings.deload);
  saveS();
}

function setNotifMode(mode){
  S.settings.notifMode = mode;
  saveS();
  const ir = document.getElementById('interval-row');
  if(ir) ir.style.display = mode==='interval' ? 'block' : 'none';
  ['hourly','interval'].forEach(m=>{
    const btn = document.getElementById('nmode-'+m);
    if(!btn) return;
    const on = m===mode;
    btn.style.borderColor = on?'var(--green)':'var(--b1)';
    btn.style.background = on?'var(--gd)':'var(--s2)';
    btn.style.color = on?'var(--green)':'var(--tf)';
  });
}

function setNotifInterval(n){
  S.settings.notifInterval = n;
  saveS();
  [1,2,3,4,6].forEach(v=>{
    const btn = document.getElementById('nint-'+v);
    if(!btn) return;
    const on = v===n;
    btn.style.borderColor = on?'var(--green)':'var(--b1)';
    btn.style.background = on?'var(--gd)':'var(--s2)';
    btn.style.color = on?'var(--green)':'var(--tf)';
  });
}

function toggleNotifDay(i){
  const days = S.settings.notifDays || [0,2,4,5];
  const idx = days.indexOf(i);
  if(idx>=0) days.splice(idx,1); else days.push(i);
  S.settings.notifDays = days;
  saveS();
  const btn = document.getElementById('nday-'+i);
  const on = days.includes(i);
  if(btn){
    btn.style.borderColor = on?'var(--green)':'var(--b1)';
    btn.style.background = on?'var(--gd)':'var(--s2)';
    btn.querySelector('div').style.color = on?'var(--green)':'var(--tf)';
  }
}

let _armedReset = null;
let _armedTimer = null;
function armReset(type, label){
  const btnId = 'rbtn-'+type;
  const btn = document.getElementById(btnId);
  if(!btn) return;
  if(_armedReset === type){
    // Second tap — execute
    clearTimeout(_armedTimer);
    _armedReset = null;
    btn.textContent = label;
    btn.style.borderColor='';btn.style.color='';btn.style.background='';
    if(type==='baseline') resetBaseline();
    else if(type==='sessions') resetSessions();
    else resetAll();
  } else {
    // First tap — arm
    if(_armedReset){
      const old = document.getElementById('rbtn-'+_armedReset);
      if(old){ old.textContent = old.dataset.label||''; old.style.borderColor='';old.style.color='';old.style.background=''; }
    }
    clearTimeout(_armedTimer);
    _armedReset = type;
    btn.dataset.label = label;
    btn.textContent = 'TAP AGAIN TO CONFIRM';
    btn.style.borderColor='var(--red)';btn.style.color='var(--red)';btn.style.background='#2a0a0a';
    _armedTimer = setTimeout(()=>{
      _armedReset=null;
      if(btn){ btn.textContent=label;btn.style.borderColor='';btn.style.color='';btn.style.background=''; }
    }, 3000);
  }
}

function resetBaseline(){ S.baseline=null; saveS(); showToast('Baseline cleared'); renderSettings(); }
function resetSessions(){ S.sessions=[]; S.ticks={}; saveS(); showToast('Sessions cleared'); renderSettings(); }
function resetAll(){ S={sessions:[],weights:[],ticks:{},baseline:null,settings:{startDate:today(),startWeight:102,targetWeight:85,deload:false,notifGranted:false,notifMode:'hourly',notifInterval:2,notifStart:'07:00',notifEnd:'21:00',notifDays:[0,2,4,5]}}; saveS(); showToast('All data reset'); renderSettings(); }

// ─── NAV ──────────────────────────────────────────────────────────────────────
function goNav(name, btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='today'){ _viewingDow=null; renderToday(); }
  if(name==='dash') renderDash();
  if(name==='prog') renderProg();
  if(name==='settings') renderSettings();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function calcStreak(){
  const sorted=[...S.sessions].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length) return 0;
  let streak=1,prev=sorted[0].date;
  for(let i=1;i<sorted.length;i++){
    const diff=(new Date(prev)-new Date(sorted[i].date))/86400000;
    if(diff<=3){streak++;prev=sorted[i].date;}else break;
  }
  return streak;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function confetti(){
  const cols=['#39d98a','#4da6ff','#a78bfa','#f5a623','#ff5c5c'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[i%5]};animation-delay:${Math.random()*.5}s;animation-duration:${.8+Math.random()*.8}s`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),1600);
  }
}

// Init
renderToday();
if(S.settings.notifGranted && Notification.permission==='granted') initNotifs();
